<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskDB — Gestor de Tareas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #a594f9;
      margin-bottom: 0.25rem;
    }
    .subtitle { font-size: 14px; color: #7a788c; margin-bottom: 2rem; }

    /* Formulario */
    .form {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem;
    }
    .form input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e0f0;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    .form input:focus { border-color: #a594f9; }
    .form select {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 10px 10px;
      color: #a594f9;
      font-size: 13px;
      outline: none;
    }
    .form button {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }
    .form button:hover { background: #6b5ae8; }

    /* Lista de tareas */
    .list {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .task-item {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity .2s;
    }
    .task-item.done { opacity: 0.45; }
    .task-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #7c6af7;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-title {
      flex: 1;
      font-size: 15px;
      text-decoration: none;
    }
    .task-item.done .task-title { text-decoration: line-through; color: #7a788c; }
    .priority-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .p-high   { background:#3d1a1f; color:#e85d73; }
    .p-medium { background:#2d2710; color:#f5a623; }
    .p-low    { background:#0f2b1f; color:#3ecf8e; }
    .delete-btn {
      background: transparent;
      border: none;
      color: #4a4858;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .2s, background .2s;
    }
    .delete-btn:hover { color: #e85d73; background: rgba(232,93,115,0.1); }

    .empty {
      text-align: center;
      color: #7a788c;
      font-size: 14px;
      padding: 3rem 0;
    }
    .status {
      font-size: 13px;
      color: #7a788c;
      margin-bottom: 1rem;
      max-width: 600px;
      width: 100%;
    }
    .error-msg {
      color: #e85d73;
      background: rgba(232,93,115,0.1);
      border: 1px solid rgba(232,93,115,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>TaskDB</h1>
  <p class="subtitle">Gestor de tareas · MongoDB Atlas + Render</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form">
    <input type="text" id="titleInput" placeholder="Nueva tarea…" />
    <select id="prioritySelect">
      <option value="medium">Media</option>
      <option value="high">Alta</option>
      <option value="low">Baja</option>
    </select>
    <button onclick="createTask()">+ Agregar</button>
  </div>

  <p class="status" id="statusText">Cargando tareas…</p>
  <div class="list" id="taskList"></div>

<script>
  // ⚠️ Cambia esta URL por la URL de tu servicio en Render
  const API = 'https://taskdb.onrender.com/api/tasks';

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function loadTasks() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error('Error al obtener tareas');
      const tasks = await res.json();
      renderTasks(tasks);
      document.getElementById('statusText').textContent =
        tasks.length === 0 ? '' : `${tasks.length} tarea${tasks.length !== 1 ? 's' : ''}`;
    } catch (e) {
      showError('No se pudo conectar al servidor. ¿Está despierto Render?');
      document.getElementById('statusText').textContent = '';
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    if (tasks.length === 0) {
      list.innerHTML = '<p class="empty">No hay tareas aún. ¡Agrega una!</p>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t._id}">
        <input type="checkbox" ${t.done ? 'checked' : ''}
          onchange="toggleTask('${t._id}', this.checked)" />
        <span class="task-title">${escapeHtml(t.title)}</span>
        <span class="priority-badge p-${t.priority}">${t.priority}</span>
        <button class="delete-btn" onclick="deleteTask('${t._id}')" title="Eliminar">✕</button>
      </div>
    `).join('');
  }

  async function createTask() {
    const input    = document.getElementById('titleInput');
    const priority = document.getElementById('prioritySelect').value;
    const title    = input.value.trim();
    if (!title) return;

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority })
      });
      if (!res.ok) throw new Error();
      input.value = '';
      loadTasks();
    } catch {
      showError('Error al crear la tarea.');
    }
  }

  async function toggleTask(id, done) {
    try {
      await fetch(`${API}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done })
      });
      loadTasks();
    } catch {
      showError('Error al actualizar la tarea.');
    }
  }

  async function deleteTask(id) {
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadTasks();
    } catch {
      showError('Error al eliminar la tarea.');
    }
  }

  // Enter para agregar tarea
  document.getElementById('titleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  // Función auxiliar para escapar HTML
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadTasks();
</script>
</body>
</html>
